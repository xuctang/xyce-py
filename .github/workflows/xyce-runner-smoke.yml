name: Xyce Runner Smoke

on:
  workflow_dispatch:

jobs:
  xyce-runner-smoke-linux:
    runs-on: [self-hosted, linux, xyce]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify runner Python
        run: |
          python3 --version
          python3 - <<'PY'
          import sys
          import venv
          if sys.version_info < (3, 10):
              raise SystemExit("Python 3.10 or newer is required on the self-hosted runner.")
          PY

      - name: Install test dependencies
        run: |
          python3 -m venv "$RUNNER_TEMP/xyce-py-venv"
          "$RUNNER_TEMP/xyce-py-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/xyce-py-venv/bin/python" -m pip install -e '.[test]'

      - name: Run Xyce smoke test
        run: |
          "$RUNNER_TEMP/xyce-py-venv/bin/python" -m pytest tests/integration/test_xyce_runner_smoke.py -m xyce -q

      - name: Write Linux runner summary
        if: always()
        run: |
          {
            echo "## Linux Runner Smoke"
            echo ""
            echo "- Runner OS: $RUNNER_OS"
            echo "- Runner Architecture: $RUNNER_ARCH"
            if [[ -x "$RUNNER_TEMP/xyce-py-venv/bin/python" ]]; then
              echo "- Python: $("$RUNNER_TEMP/xyce-py-venv/bin/python" --version 2>&1)"
            else
              echo "- Python: $(python3 --version 2>&1)"
            fi
            echo "- Xyce path: $(command -v Xyce || echo 'not found')"
            echo "- Xyce version:"
            echo '```text'
            Xyce -v 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  xyce-runner-smoke-macos:
    runs-on: [self-hosted, macos, xyce]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify runner Python
        run: |
          python3 --version
          python3 - <<'PY'
          import sys
          import venv
          if sys.version_info < (3, 10):
              raise SystemExit("Python 3.10 or newer is required on the self-hosted runner.")
          PY

      - name: Install test dependencies
        run: |
          python3 -m venv "$RUNNER_TEMP/xyce-py-venv"
          "$RUNNER_TEMP/xyce-py-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/xyce-py-venv/bin/python" -m pip install -e '.[test]'

      - name: Run Xyce smoke test
        run: |
          "$RUNNER_TEMP/xyce-py-venv/bin/python" -m pytest tests/integration/test_xyce_runner_smoke.py -m xyce -q

      - name: Write macOS runner summary
        if: always()
        run: |
          {
            echo "## macOS Runner Smoke"
            echo ""
            echo "- Runner OS: $RUNNER_OS"
            echo "- Runner Architecture: $RUNNER_ARCH"
            if [[ -x "$RUNNER_TEMP/xyce-py-venv/bin/python" ]]; then
              echo "- Python: $("$RUNNER_TEMP/xyce-py-venv/bin/python" --version 2>&1)"
            else
              echo "- Python: $(python3 --version 2>&1)"
            fi
            echo "- Xyce path: $(command -v Xyce || echo 'not found')"
            echo "- Xyce version:"
            echo '```text'
            Xyce -v 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
