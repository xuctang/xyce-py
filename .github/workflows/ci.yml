name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    name: unit (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[test]'

      - name: Run unit suite
        run: pytest tests/unit -m "unit" --cov=xyce_py --cov-report=xml --cov-fail-under=95

  unit-lower-bounds:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimum runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints/runtime-min.txt -e '.[test]'

      - name: Run unit suite against lower bounds
        run: pytest tests/unit -m "unit"

  property:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[test]'

      - name: Run property suite
        run: pytest tests/property -m "property"

  build-distributions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip && python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*

  packaging-smoke:
    name: packaging smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: build-distributions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set virtualenv Python path
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "VENV_PY=.pkg-venv/Scripts/python.exe" >> "$GITHUB_ENV"
          else
            echo "VENV_PY=.pkg-venv/bin/python" >> "$GITHUB_ENV"
          fi

      - name: Install built wheel into a fresh virtualenv
        run: |
          python -m venv .pkg-venv
          "$VENV_PY" -m pip install --upgrade pip
          "$VENV_PY" -m pip install "$(python tools/release_helpers.py wheel-path --dist-dir dist)" pytest

      - name: Run packaging smoke tests
        run: "$VENV_PY" -m pytest tests/packaging -m packaging

  sdist-smoke:
    name: sdist smoke (py${{ matrix.python-version }})
    needs: build-distributions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install built sdist into a fresh virtualenv
        run: |
          python -m venv .pkg-venv
          ./.pkg-venv/bin/python -m pip install --upgrade pip
          ./.pkg-venv/bin/python -m pip install "$(python tools/release_helpers.py sdist-path --dist-dir dist)" pytest

      - name: Run packaging smoke tests
        run: ./.pkg-venv/bin/python -m pytest tests/packaging -m packaging
